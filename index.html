<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teddy Bell | Digital Card &amp; Design Lab</title>
    <meta name="theme-color" id="theme-meta" content="#445e68">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" crossorigin="anonymous"></script>
    
    <!-- Google Fonts for custom luxury styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&amp;family=Inter:wght@300;400;600;700;800&amp;family=Montserrat:wght@300;400;600;700;800&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">

    <style id="dynamic-styles">
        :root { 
            --bg-dark: #445e68; 
            --gold: #dac386; 
            --white: #ffffff; 
            --olive: #dac386aa; 
            --base-glow: #00504e;
            --rating-color: #dac386;
            --glass: rgba(255, 255, 255, 0.1); 
            --font-family: 'Inter', sans-serif;
        }
    </style>
    
    <style>
        body {
            font-family: var(--font-family);
            background-color: #121212;
            transition: background-color 0.4s ease;
        }

        .custom-font-render {
            font-family: var(--font-family) !important;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card { 
            width: 100%; 
            max-width: 375px; 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border-radius: 32px; 
            border: 1px solid rgba(218, 195, 134, 0.25); 
            padding: 26px 22px; 
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7); 
            text-align: center; 
            position: relative; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            animation: cardEntrance 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
        }

        .card.shimmer-on::after { 
            content: ""; 
            position: absolute; 
            pointer-events: none; 
            z-index: 1; 
            top: -50%; 
            left: -100%; 
            width: 30%; 
            height: 200%; 
            background: linear-gradient(to right, transparent, rgba(218, 195, 134, 0.25), transparent); 
            transform: rotate(30deg); 
            animation: sweepRight 7s infinite linear; 
        } 
        
        @keyframes sweepRight { 
            0% { left: -100%; } 
            18% { left: 150%; } 
            100% { left: 150%; } 
        }
        @keyframes cardEntrance { 
            from { opacity: 0; transform: translateY(40px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .coin-wrapper { 
            width: 125px; 
            height: 125px; 
            margin: 0 auto 16px; 
            perspective: 1000px; 
            display: block; 
            cursor: pointer;
        }
        .profile-media-container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .coin-wrapper.spin-enabled:hover .profile-media-container {
            transform: rotateY(180deg);
        }
        .coin-wrapper.is-flipped .profile-media-container {
            transform: rotateY(180deg) !important;
        }
        
        .face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            padding: 4px; 
            background: #111; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            transition: border-radius 0.4s ease;
        }
        .face-front { transform: rotateY(0deg); }
        .face-back { 
            transform: rotateY(180deg); 
            background-size: cover; 
            background-position: center; 
            background-color: var(--bg-dark);
        }

        .shape-circle .face { border-radius: 50%; }
        
        .rating-icon { 
            width: 16px; 
            height: 16px; 
            fill: var(--rating-color); 
            display: inline-block; 
            animation: starWave 3s ease-in-out infinite; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }
        @keyframes starWave { 
            0%, 60%, 100% { transform: translateY(0); } 
            30% { transform: translateY(-4px); } 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .main-logo {
            max-height: 64px;
            width: auto;
            display: block;
            margin: 0 auto 8px;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col lg:flex-row relative overflow-x-hidden antialiased" style="font-family: 'Inter', sans-serif;">

    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none" style="z-index:-20;" width="1150" height="1083"></canvas>
    
    <div id="bg-glow-layer" class="fixed top-0 left-0 w-full h-full pointer-events-none" style="z-index:-10; opacity:0.7; background: radial-gradient(circle, rgb(0, 80, 78) 0%, rgb(68, 94, 104) 100%);"></div>

    <main class="min-h-screen w-full flex flex-col items-center justify-center p-4 relative">
        <div class="card shimmer-on custom-font-render" id="main-card">
                
            <!-- Drawer Overlay: Social Links -->
            <div id="social-sheet" class="absolute left-0 w-full backdrop-blur-2xl border-t border-amber-200/30 rounded-t-[32px] p-6 z-30 transition-all duration-500 text-left" style="bottom:-100%; background:rgb(17 24 23 / 0.95);">
                <div class="w-10 h-1.5 bg-amber-200/30 rounded-full mx-auto mb-5"></div>
                <div class="flex justify-between items-center mb-5">
                    <span class="text-amber-200 font-extrabold text-[11px] uppercase tracking-widest">Connect With Teddy</span>
                    <button onclick="toggleSocials()" class="text-amber-200/80 hover:text-white p-1 rounded-full hover:bg-white/5 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-2.5">
                    <button onclick="handleNav('https://www.facebook.com/marriedbyateddy/')" class="w-full flex items-center justify-start gap-4 px-4 py-3.5 bg-white/[0.04] hover:bg-white/[0.08] active:scale-95 border border-white/[0.06] rounded-xl text-xs uppercase tracking-wide text-white transition-all font-bold">
                        <i data-lucide="facebook" class="w-4 h-4 text-amber-200"></i> Facebook Page
                    </button>
                    <button onclick="handleNav('https://www.instagram.com/marriedbyateddy')" class="w-full flex items-center justify-start gap-4 px-4 py-3.5 bg-white/[0.04] hover:bg-white/[0.08] active:scale-95 border border-white/[0.06] rounded-xl text-xs uppercase tracking-wide text-white transition-all font-bold">
                        <i data-lucide="instagram" class="w-4 h-4 text-amber-200"></i> Instagram Profile
                    </button>
                    <button onclick="handleNav('https://www.tiktok.com/@married.by.a.teddy')" class="w-full flex items-center justify-start gap-4 px-4 py-3.5 bg-white/[0.04] hover:bg-white/[0.08] active:scale-95 border border-white/[0.06] rounded-xl text-xs uppercase tracking-wide text-white transition-all font-bold">
                        <svg class="w-4 h-4 fill-amber-200" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.01 1.62 4.14 1.12 1.21 2.7 1.93 4.3 2.02v3.61c-1.34-.1-2.65-.57-3.73-1.39-.75-.58-1.38-1.35-1.79-2.22-.05 1.7-.02 3.39-.03 5.09-.05 2.19-.51 4.39-1.57 6.3-1.63 3.12-5.01 5.22-8.54 5.26-3.83.17-7.61-2.42-8.72-6.11-1.35-4.11.45-8.87 4.29-10.74 1.74-.91 3.75-1.19 5.67-.78v3.63c-1.12-.42-2.39-.33-3.41.31-1.34.82-2.07 2.45-1.8 4 0 .04.01.07.02.11.39 2.13 2.39 3.66 4.54 3.49 2.16-.01 3.96-1.68 4.14-3.83.08-2.66.03-5.32.05-7.98-.02-1.89-.01-3.79-.02-5.69z"></path></svg>
                        TikTok Channel
                    </button>
                </div>
            </div>

            <!-- Drawer Overlay: Contact Form -->
            <div id="contact-sheet" class="absolute left-0 w-full backdrop-blur-2xl border-t border-amber-200/30 rounded-t-[32px] p-6 z-30 transition-all duration-500 text-left" style="bottom:-100%; background:rgb(17 24 23 / 0.95);">
                <div class="w-10 h-1.5 bg-amber-200/30 rounded-full mx-auto mb-4"></div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-amber-200 font-extrabold text-[11px] uppercase tracking-widest">Send Direct Message</span>
                    <button onclick="toggleContactForm()" class="text-amber-200/80 hover:text-white p-1 rounded-full hover:bg-white/5 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <form id="enquiry-form" onsubmit="sendContactFormEmail(event)" class="space-y-3">
                    <div>
                        <label class="block text-[10px] uppercase tracking-wider text-amber-200/80 mb-1 font-semibold">Your Name</label>
                        <input type="text" id="form-name" required placeholder="John Citizen" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-amber-200/60 focus:bg-white/[0.08] transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-amber-200/80 mb-1 font-semibold">Email Address</label>
                            <input type="email" id="form-email" required placeholder="john@example.com" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-amber-200/60 focus:bg-white/[0.08] transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-wider text-amber-200/80 mb-1 font-semibold">Phone Number</label>
                            <input type="tel" id="form-phone" required placeholder="0400 000 000" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-amber-200/60 focus:bg-white/[0.08] transition-all">

                    </div>
                    <div>

                        <textarea id="form-message" required rows="3" placeholder="Tell Teddy about your event details..." class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-amber-200/60 focus:bg-white/[0.08] transition-all resize-none"></textarea>

            </div>

            <!-- Logo -->

                <img id="el-logo" src="https://images.squarespace-cdn.com/content/v1/6726c58f040ca9295a58f6d9/5eb067ff-d33b-45ba-a5d5-bd9ac62c0944/MBAT+Logo+-+White.png?format=1500w" class="main-logo" alt="Married By A Teddy Logo">
                <div id="el-tagline" class="text-[9px] font-semibold text-center tracking-[2.5px] uppercase text-amber-200">Inclusive Melbourne Celebrant</div>
            </div>

            <!-- Profile Coin -->
            <div id="el-coin" class="coin-wrapper mt-4 shape-circle spin-enabled" onclick="handleFlipCoin()" style="width: 125px; height: 125px;">
                <div class="profile-media-container">
                    <div class="face face-front">
                        <img id="el-profile" src="https://scontent.fmel12-1.fna.fbcdn.net/v/t39.30808-6/622402951_122188175858574029_7514423290536387646_n.jpg?stp=dst-jpg_tt6&cstp=mx1440x1440&ctp=s1440x1440&_nc_cat=109&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=DsBhahfiEWoQ7kNvwHRWZ-G&_nc_oc=AdrQdfB3c_MKs98UON-A1KVVYggJ-GF9gNcidgfSyG8pfxCXbHFvHC8Af-dBwqQYVnQ&_nc_zt=23&_nc_ht=scontent.fmel12-1.fna&_nc_gid=B2wB95Mcj-_2mHy4JkPfxQ&_nc_ss=7b2a8&oh=00_Af_K1CwnfQJeIntz1oFlu2lqe_xIcbBcYaiq9s0kpb827Q&oe=6A46A04D" class="w-full h-full object-cover select-none pointer-events-none" alt="Profile" style="transform: translate(2px, 0px) scale(1.3); transform-origin: center center;">
                    </div>
                    <div class="face face-back" style="background-image: url('https://raw.githubusercontent.com/theknightlyphotobooth/Images-/01668a04aceed0bceecc35b363e5115693d4dd63/Back.jpg');"></div>
                </div>
            </div>

            <!-- Identity -->
            <div class="text-center mt-3">
                <h2 id="el-name" class="text-xl font-bold text-white tracking-wider">Teddy Bell</h2>
                <div id="el-subtitles" class="mt-1 space-y-0.5">
                    <div id="el-title" class="text-xs text-amber-200 opacity-90 font-medium">Modern Celebrant &amp; Filmmaker</div>
                    <div id="el-org" class="text-[10px] text-white/60 tracking-wider font-semibold uppercase">Married By A Teddy</div>
                </div>
            </div>
            
            <!-- Stars -->
            <div class="flex justify-center gap-1.5 mt-3 mb-3" id="el-rating-container">
                <svg class="rating-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                <svg class="rating-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                <svg class="rating-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                <svg class="rating-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                <svg class="rating-icon" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
            </div>
            
            <!-- Review -->

            <!-- Actions -->
            <div class="actions flex flex-col gap-2.5 relative z-20">
                
                <button onclick="generateVCard()" class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-white hover:bg-slate-100 active:scale-[0.98] transition-all rounded-xl text-slate-950 text-xs font-black uppercase tracking-wider shadow-lg" id="btn-el-save">
                    <i data-lucide="user-plus" id="saveIcon" class="w-4 h-4 text-slate-900"></i>
                    <div class="hidden w-4 h-4 border-2 border-slate-300 border-t-slate-900 rounded-full animate-spin" id="saveSpinner"></div>
                    <span id="txt-el-save">Save Digital Card</span>
                </button>
                
                <div class="grid grid-cols-2 gap-2.5" id="btn-el-contact">
                    <button onclick="handleNav('tel:+61423670033')" class="flex items-center justify-center gap-2 py-3 px-3 bg-white/[0.04] hover:bg-white/[0.08] border border-amber-200/30 active:scale-[0.98] transition-all rounded-xl text-white text-xs font-bold uppercase tracking-wider">
                        <i data-lucide="phone" class="w-3.5 h-3.5 text-amber-200"></i> Call
                    </button>
                    <button onclick="handleNav('sms:+61423670033')" class="flex items-center justify-center gap-2 py-3 px-3 bg-white/[0.04] hover:bg-white/[0.08] border border-amber-200/30 active:scale-[0.98] transition-all rounded-xl text-white text-xs font-bold uppercase tracking-wider">
                        <i data-lucide="message-square" class="w-3.5 h-3.5 text-amber-200"></i> SMS
                    </button>
                </div>

                <button onclick="handleNav('https://www.marriedbyateddy.com/')" class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-amber-200 hover:bg-amber-300 text-slate-950 active:scale-[0.98] transition-all rounded-xl text-xs font-extrabold uppercase tracking-widest shadow-xl" id="btn-el-book">
                    <i data-lucide="calendar" class="w-4 h-4 text-slate-900"></i> Book A Ceremony Consultation
                </button>

                <button onclick="toggleSocials()" class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-white/[0.04] hover:bg-white/[0.08] border border-amber-200/30 active:scale-[0.98] transition-all rounded-xl text-white text-xs font-extrabold uppercase tracking-widest" id="btn-el-socials">
                    <i data-lucide="share-2" class="w-4 h-4 text-amber-200"></i> View Social Portfolios
                </button>

                <button onclick="toggleContactForm()" class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-white/[0.04] hover:bg-white/[0.08] border border-amber-200/20 active:scale-[0.98] transition-all rounded-xl text-white text-xs font-extrabold uppercase tracking-widest" id="btn-el-email">
                    <i data-lucide="mail" class="w-4 h-4 text-amber-200"></i> Send Teddy A Message
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-6 text-[9px] font-semibold tracking-[3px] text-amber-200/60 uppercase" id="el-footer">Melbourne • Victoria • Australia</div>
        </div>
    </main>

    <script>
        const currentAppUrl = "https://www.marriedbyateddy.com/";
        const currentEmail = "hello@marriedbyateddy.com";
        const currentPhone = "+61423670033";
        const currentName = "Teddy Bell";
        const currentTitle = "Modern Celebrant & Filmmaker";
        const currentOrg = "Married By A Teddy";
        const currentSubjectPrefix = "Wedding Enquiry from Digital Card";
        const spinEnabled = true;
        const particlesEnabled = true;
        
        lucide.createIcons();
        
        function toggleSocials() { 
            const contactSheet = document.getElementById('contact-sheet');
            contactSheet.style.bottom = '-100%';

            const sheet = document.getElementById('social-sheet');
            if(sheet.style.bottom === '0px') {
                sheet.style.bottom = '-100%';
            } else {
                sheet.style.bottom = '0px';
            }
        }

        function toggleContactForm() {
            const socialSheet = document.getElementById('social-sheet');
            socialSheet.style.bottom = '-100%';

            const sheet = document.getElementById('contact-sheet');
            if(sheet.style.bottom === '0px') {
                sheet.style.bottom = '-100%';
            } else {
                sheet.style.bottom = '0px';
            }
        }

        function sendContactFormEmail(event) {
            event.preventDefault();
            const clientName = document.getElementById('form-name').value;
            const clientEmail = document.getElementById('form-email').value;
            const clientPhone = document.getElementById('form-phone').value;
            const clientMessage = document.getElementById('form-message').value;

            const subject = currentSubjectPrefix + ' - ' + clientName;
            const body = 'Hi Teddy,\n\nYou have received a new enquiry from your digital business card:\n\n' +
                         '---------------------------------------------\n' +
                         'Sender Name: ' + clientName + '\n' +
                         'Sender Email: ' + clientEmail + '\n' +
                         'Sender Phone: ' + clientPhone + '\n' +
                         '---------------------------------------------\n\n' +
                         'Message:\n' + clientMessage + '\n\n' +
                         'Sent via your digital design lab business card.';

            const mailtoUrl = 'mailto:' + currentEmail + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
            window.location.href = mailtoUrl;

            document.getElementById('enquiry-form').reset();
            toggleContactForm();
        }
        
        function handleFlipCoin() {
            if (!spinEnabled) return;
            document.getElementById('el-coin').classList.toggle('is-flipped');
        }

        function handleNav(url) { 
            if(url) window.open(url, '_blank'); 
        }

        async function generateVCard() {
            const btn = document.getElementById('btn-el-save'); 
            const icon = document.getElementById('saveIcon'); 
            const spin = document.getElementById('saveSpinner');
            
            btn.style.opacity = "0.7"; 
            icon.style.display = "none"; 
            spin.style.display = "block";

            const vCard = [
                "BEGIN:VCARD", "VERSION:3.0",
                "FN:" + currentName,
                "TITLE:" + currentTitle,
                "ORG:" + currentOrg,
                "TEL;TYPE=CELL,VOICE:" + currentPhone,
                "EMAIL:" + currentEmail, 
                "URL:" + currentAppUrl,
                "END:VCARD"
            ].join("\r\n");

            const blob = new Blob([vCard], {type: 'text/vcard'}); 
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a'); 
            link.href = url; 
            link.download = currentName.replace(/\s+/g, '_') + "_contact.vcf"; 
            link.click();
            
            setTimeout(() => { 
                btn.style.opacity = "1"; 
                icon.style.display = "block"; 
                spin.style.display = "none"; 
            }, 1000);
        }

        // Particle system
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedY = -(Math.random() * 0.4 + 0.1);
            }
            draw() {
                ctx.fillStyle = '#dac386';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        function initParticles() {
            particlesArray = [];
            const count = Math.min(Math.floor(window.innerWidth / 15), 90);
            for (let i = 0; i < count; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            if (!particlesEnabled) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (particlesEnabled) {
                initParticles();
                animate();
            }
        };
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (particlesEnabled) initParticles();
        };
    </script>

</body></html>
