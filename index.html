                    :root {

    <style>
        body {
            font-family: var(--font-family);
            background-color: #121212;
            transition: background-color 0.4s ease;
        }

        .custom-font-render {
            font-family: var(--font-family) !important;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Digital Card Layout & Interactive Glows */
        .card { 
            width: 100%; 
            max-width: 375px; 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border-radius: 32px; 
            border: 1px solid rgba(218, 195, 134, 0.25); 
            padding: 26px 22px; 
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7); 
            text-align: center; 
            position: relative; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            animation: cardEntrance 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
        }

        /* Metallic Card Shimmer Shine effect */
        .card.shimmer-on::after { 
            content: ""; 
            position: absolute; 
            pointer-events: none; 
            z-index: 1; 
            top: -50%; 
            left: -100%; 
            width: 30%; 
            height: 200%; 
            background: linear-gradient(to right, transparent, rgba(218, 195, 134, 0.25), transparent); 
            transform: rotate(30deg); 
            animation: sweepRight 7s infinite linear; 
        } 
        
        @keyframes sweepRight { 
            0% { left: -100%; } 
            18% { left: 150%; } 
            100% { left: 150%; } 
        }
        @keyframes cardEntrance { 
            from { opacity: 0; transform: translateY(40px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Profile Coin Flipping styles */
        .coin-wrapper { 
            width: 125px; 
            height: 125px; 
            margin: 0 auto 16px; 
            perspective: 1000px; 
            display: block; 
            cursor: pointer;
        }
        .profile-media-container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .coin-wrapper.spin-enabled:hover .profile-media-container {
            transform: rotateY(180deg);
        }
        .coin-wrapper.is-flipped .profile-media-container {
            transform: rotateY(180deg) !important;
        }
        
        .face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            padding: 4px; 
            background: #111; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            transition: border-radius 0.4s ease;
        }
        .face-front { transform: rotateY(0deg); }
        .face-back { 
            transform: rotateY(180deg); 
            background-size: cover; 
            background-position: center; 
            background-color: var(--bg-dark);
        }

        /* Dynamic Coin Shapes */
        .shape-squircle .face { border-radius: 30%; }
        .shape-hexagon .face { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); border-radius: 0; }
        .shape-circle .face { border-radius: 50%; }
        
        .rating-icon { 
            width: 16px; 
            height: 16px; 
            fill: var(--rating-color); 
            display: inline-block; 
            animation: starWave 3s ease-in-out infinite; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }
        @keyframes starWave { 
            0%, 60%, 100% { transform: translateY(0); } 
            30% { transform: translateY(-4px); } 
        }

        /* Custom Scrollbar configuration */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

    <script>
                        let currentAppUrl = "https://www.marriedbyateddy.com/";
                        let currentEmail = "hello@marriedbyateddy.com";
                        let currentPhone = "+61422730144";
                        let currentName = "Teddy Bell";
                        let currentTitle = "Modern Celebrant & Filmmaker";
                        let currentOrg = "Married By A Teddy";
                        let currentSubjectPrefix = "Wedding Enquiry from Digital Card";
                        let spinEnabled = true;
                        let particlesEnabled = true;
                        
                        lucide.createIcons();
                        
                        function toggleSocials() { 
                            const contactSheet = document.getElementById('contact-sheet');
                            contactSheet.style.bottom = '-100%';
                            contactSheet.classList.remove('active');

                            const sheet = document.getElementById('social-sheet');
                            if(sheet.style.bottom === '0px' || sheet.classList.contains('active')) {
                                sheet.style.bottom = '-100%';
                                sheet.classList.remove('active');
                            } else {
                                sheet.style.bottom = '0px';
                                sheet.classList.add('active');
                            }
                        }

                        function toggleContactForm() {
                            const socialSheet = document.getElementById('social-sheet');
                            socialSheet.style.bottom = '-100%';
                            socialSheet.classList.remove('active');

                            const sheet = document.getElementById('contact-sheet');
                            if(sheet.style.bottom === '0px' || sheet.classList.contains('active')) {
                                sheet.style.bottom = '-100%';
                                sheet.classList.remove('active');
                            } else {
                                sheet.style.bottom = '0px';
                                sheet.classList.add('active');
                            }
                        }

                        function sendContactFormEmail(event) {
                            event.preventDefault();
                            const clientName = document.getElementById('form-name').value;
                            const clientEmail = document.getElementById('form-email').value;
                            const clientPhone = document.getElementById('form-phone').value;
                            const clientMessage = document.getElementById('form-message').value;

                            const subject = (currentSubjectPrefix || 'Ceremony Enquiry') + ' - ' + clientName;
                            const body = 'Hi Teddy,\n\nYou have received a new enquiry from your digital business card:\n\n' +
                                         '---------------------------------------------\n' +
                                         'Sender Name: ' + clientName + '\n' +
                                         'Sender Email: ' + clientEmail + '\n' +
                                         'Sender Phone: ' + clientPhone + '\n' +
                                         '---------------------------------------------\n\n' +
                                         'Message:\n' + clientMessage + '\n\n' +
                                         'Sent via your digital design lab business card.';

                            const mailtoUrl = 'mailto:' + currentEmail + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
                            window.location.href = mailtoUrl;

                            document.getElementById('enquiry-form').reset();
                            toggleContactForm();
                        }
                        
                        function handleFlipCoin() {
                            if (!spinEnabled) return;
                            document.getElementById('el-coin').classList.toggle('is-flipped');
                        }

                        function handleNav(url) { 
                            if(url) window.open(url, '_blank'); 
                        }
                        
                        function handleAppNav() { 
                            if(currentAppUrl) window.open(currentAppUrl, '_blank'); 
                        }

                        async function generateVCard() {
                            const btn = document.getElementById('btn-el-save'); 
                            const icon = document.getElementById('saveIcon'); 
                            const spin = document.getElementById('saveSpinner');
                            
                            btn.style.opacity = "0.7"; 
                            icon.style.display = "none"; 
                            spin.style.display = "block";

                            const vCard = [
                                "BEGIN:VCARD", "VERSION:3.0",
                                "FN:" + currentName,
                                "TITLE:" + currentTitle,
                                "ORG:" + currentOrg,
                                "TEL;TYPE=CELL,VOICE:" + currentPhone,
                                "EMAIL:" + currentEmail, 
                                "URL:" + currentAppUrl,
                                "END:VCARD"
                            ].join("\r\n");

                            const blob = new Blob([vCard], {type: 'text/vcard'}); 
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a'); 
                            link.href = url; 
                            link.download = currentName.replace(/\s+/g, '_') + "_contact.vcf"; 
                            link.click();
                            
                            setTimeout(() => { 
                                btn.style.opacity = "1"; 
                                icon.style.display = "block"; 
                                spin.style.display = "none"; 
                            }, 1000);
                        }

                        // Compact High Performance stand-alone canvas floating particle system
                        const canvas = document.getElementById('bg-canvas');
                        const ctx = canvas.getContext('2d');
                        let particlesArray = [];

                        class Particle {
                            constructor() {
                                this.x = Math.random() * canvas.width;
                                this.y = Math.random() * canvas.height;
                                this.size = Math.random() * 2 + 1;
                                this.speedY = -(Math.random() * 0.4 + 0.1);
                            }
                            draw() {
                                ctx.fillStyle = '#dac386';
                                ctx.beginPath();
                                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            update() {
                                this.y += this.speedY;
                                if (this.y < 0) {
                                    this.y = canvas.height;
                                    this.x = Math.random() * canvas.width;
                                }
                            }
                        }

                        function initParticles() {
                            particlesArray = [];
                            const count = Math.min(Math.floor(window.innerWidth / 15), 90);
                            for (let i = 0; i < count; i++) {
                                particlesArray.push(new Particle());
                            }
                        }

                        function animate() {
                            if (!particlesEnabled) return;
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            for (let i = 0; i < particlesArray.length; i++) {
                                particlesArray[i].update();
                                particlesArray[i].draw();
                            }
                            requestAnimationFrame(animate);
                        }

                        window.onload = () => {
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                            if (particlesEnabled) {
                                initParticles();
                                animate();
                            }
                        };
                        window.onresize = () => {
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                            if (particlesEnabled) {
                                initParticles();
                            }
                        };
                    </script>
